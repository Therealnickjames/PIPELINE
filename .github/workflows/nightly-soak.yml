name: Nightly Soak

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  nightly-soak:
    name: nightly-soak
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run soak
      - run: node bin/pipeline.js status --validate --json
