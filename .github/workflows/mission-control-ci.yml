name: Mission Control CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  mission-control-ci:
    name: mission-control-ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mission-control-source
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: mission-control-source/package-lock.json
      - run: npm ci
      - run: npm test
